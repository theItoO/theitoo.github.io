<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Itoo Manifest</title>
    <link rel="icon" type="image/png" href="./icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isUnbuiltGithubPagesRoot = location.hostname === 'theitoo.github.io' && '%BASE_URL%' === '%' + 'BASE_URL%'

      if (isUnbuiltGithubPagesRoot) {
        document.querySelector('link[rel="icon"]').href = './dist/icon.png'

        const stylesheet = document.createElement('link')
        stylesheet.rel = 'stylesheet'
        stylesheet.crossOrigin = ''
        stylesheet.href = './dist/assets/main.css'
        document.head.appendChild(stylesheet)

        const appScript = document.createElement('script')
        appScript.type = 'module'
        appScript.crossOrigin = ''
        appScript.src = './dist/assets/index.js'
        document.body.appendChild(appScript)
      } else {
        import('/src/main.jsx')
      }
    </script>
  </body>
</html>
